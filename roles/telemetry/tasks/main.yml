- name: Install Prometheus
  block:
    - include_role:
        name: prometheus.prometheus.prometheus
      vars:
        prometheus_web_listen_address: "localhost:9090"
        prometheus_web_external_url: "/prometheus"
        ansible_fqdn: "csos.josefkolar.cz"
        prometheus_scrape_configs:
          - job_name: node
            static_configs:
              - targets: [localhost:9100]
          - job_name: mediamtx
            static_configs:
              - targets: [localhost:9998]
          - job_name: caddy
            static_configs:
              - targets: [localhost:2019]
  become: true

- name: Install Grafana
  block:
    - include_role:
        name: grafana.grafana.grafana
      vars:
        grafana_ini:
          paths:
            logs: "/var/log/grafana"
            data: "/var/lib/grafana"
          security:
            # Placeholders to pass Galaxy role preflight — actual credentials
            # are managed by grafana-cli + API tasks below.
            admin_user: "{{ credentials.telemetry[0].user }}"
            admin_password: "{{ credentials.telemetry[0].pass }}"
          auth:
            ldap: {enabled: false}
            disable_login_form: true
          auth.anonymous:
            enabled: true
            org_role: Viewer
          database:
            type: sqlite3
            path: grafana.db
          server:
            http_addr: 127.0.0.1
            http_port: 3000
            root_url: "https://{{ web_proxy__domain }}/grafana/"

        grafana_ldap:
          servers: {}
          group_mappings: []
        grafana_datasources:
          - name: prometheus
            type: prometheus
            access: proxy
            url: 'http://localhost:9090/prometheus/'
            basicAuth: false

        grafana_dashboards:
          - dashboard_id: 1860
            revision_id: 41
            datasource: prometheus
  become: true

- name: Set Grafana admin credentials
  block:
    - name: Reset admin password
      command: grafana-cli admin reset-admin-password '{{ credentials.telemetry[0].pass }}'
      changed_when: true
      no_log: true

    - name: Wait for Grafana API
      uri:
        url: "http://127.0.0.1:3000/api/health"
        status_code: [200]
      retries: 10
      delay: 2
      register: _grafana_health
      until: _grafana_health.status == 200

    - name: Set admin username
      uri:
        url: "http://127.0.0.1:3000/api/user"
        method: PUT
        body_format: json
        body:
          login: "{{ credentials.telemetry[0].user }}"
        url_username: "{{ credentials.telemetry[0].user }}"
        url_password: "{{ credentials.telemetry[0].pass }}"
        force_basic_auth: true
        status_code: [200]
      no_log: true
      register: _grafana_set_user
      failed_when: false

    - name: Set admin username (initial setup)
      uri:
        url: "http://127.0.0.1:3000/api/user"
        method: PUT
        body_format: json
        body:
          login: "{{ credentials.telemetry[0].user }}"
        url_username: admin
        url_password: "{{ credentials.telemetry[0].pass }}"
        force_basic_auth: true
        status_code: [200]
      no_log: true
      when: _grafana_set_user.status != 200
  become: true

- name: Deploy custom dashboards
  copy:
    src: mediamtx-dashboard.json
    dest: /var/lib/grafana/dashboards/mediamtx.json
    owner: grafana
    group: grafana
    mode: '0644'
  become: true

- name: Install Node Exporter
  block:
    - include_role:
        name: prometheus.prometheus.node_exporter
      vars:
        node_exporter_web_listen_address: "localhost:9100"
  become: true
