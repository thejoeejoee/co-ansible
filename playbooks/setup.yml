- name: Setup CSOS stream proxy
  hosts: csos
  strategy: free
  tasks:
    - tags: [base]
      import_role:
        name: ../roles/base

    - tags: [stream_proxy]
      import_role:
        name: ../roles/stream_proxy

    - tags: [web_proxy]
      import_role:
        name: ../roles/web_proxy

    - tags: [gfx]
      import_role:
        name: ../roles/gfx

    # - tags: [ta]
    #   import_role:
    #     name: ../roles/ta

    - tags: [telemetry]
      import_role:
        name: ../roles/telemetry
