csos:
  hosts:
    csos@orb:

  vars:
    ansible_user: csos

    credentials:
      stream_write:
        - {user: pocket, pass: changeme}
        - {user: drone, pass: changeme}
        - {user: mobile, pass: changeme}
      stream_read:
        - {user: vmix, pass: changeme}
      telemetry:
        - {user: admin, pass: changeme}
      gfx:
        - {user: admin, pass: changeme}

    web_proxy__domain: csos.orb.local
    web_proxy__disable_tls: true
